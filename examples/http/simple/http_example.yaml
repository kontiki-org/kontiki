# User-defined config (do not use the kontiki.* namespace for your own keys).
app:
  http:
    ping_path: "/ping"

kontiki:
  http:
    address: "0.0.0.0"
    port: 8080
    documentation:
      enabled: true
      path_template: "/api/{version}/docs"
      title: "HttpExampleService"
      description: "Simple HTTP example service for Kontiki."

