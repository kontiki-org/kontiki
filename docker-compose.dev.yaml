# docker-compose.dev.yml
services:
  rabbitmq:
    image: rabbitmq:3.13
    ports:
      - "5672:5672"   # AMQP
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
