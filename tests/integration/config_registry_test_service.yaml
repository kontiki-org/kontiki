kontiki:
  amqp:
    url: amqp://guest:guest@localhost/
  registration:
    disable: false
    delay: 0
  heartbeat:
    interval: 2

logging:
  version: 1
  disable_existing_loggers: True
  formatters:
    default:
      format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s - %(filename)s:%(lineno)d"
  handlers:
    console:
      class: logging.StreamHandler
      formatter: default
      level: DEBUG
  loggers:
    kontiki:
      handlers: ["console"]
      level: DEBUG
      propagate: False
  root:
    handlers: ["console"]
    level: DEBUG
